# ChurchOS — Render.com Deployment Blueprint
# https://render.com/docs/blueprint-spec
#
# This file defines ALL services needed to run ChurchOS on Render:
#   1. PostgreSQL database
#   2. Redis instance
#   3. Django API web service
#   4. Celery worker background service
#   5. Celery beat scheduler background service
#   6. Vue 3 frontend (static site)
#
# Deploy steps:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your repo — Render reads this file automatically
#   4. Fill in the required environment variable values marked with sync: false
#   5. Click "Apply" — all services deploy in order

databases:
  - name: churchos-db
    databaseName: churchos_db
    user: churchos_user
    plan: free          # upgrade to starter ($7/mo) for production persistence
    region: oregon

services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: churchos-redis
    plan: free          # upgrade to starter ($10/mo) for production
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []     # internal only

  # ── Django API (Web Service) ───────────────────────────────────────────────
  - type: web
    name: churchos-api
    region: oregon
    plan: free          # upgrade to starter ($7/mo) for always-on
    runtime: python
    rootDir: backend
    buildCommand: "./render_build.sh"
    startCommand: "DJANGO_ENV=render gunicorn churchos.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120 --access-logfile - --error-logfile -"
    healthCheckPath: /api/v1/core/settings/public/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true        # Render generates a secure random value
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"     # Updated after first deploy with your actual domain
      - key: CORS_ALLOWED_ORIGINS
        value: "https://churchos-frontend.onrender.com"   # Update with your frontend URL
      - key: DATABASE_URL
        fromDatabase:
          name: churchos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: churchos-redis
          type: redis
          property: connectionString
      - key: TIME_ZONE
        value: Africa/Accra
      # Email — fill these in on the Render dashboard
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.sendgrid.net
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        value: apikey
      - key: EMAIL_HOST_PASSWORD
        sync: false    # Set in Render dashboard → Environment
      - key: DEFAULT_FROM_EMAIL
        sync: false    # e.g. noreply@yourchurch.org
      # AI — fill in on dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Twilio SMS — fill in on dashboard
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      # WhatsApp — fill in on dashboard
      - key: WHATSAPP_API_TOKEN
        sync: false
      # Paystack — fill in on dashboard
      - key: PAYSTACK_SECRET_KEY
        sync: false
      # Python path
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── Celery Worker (Background Service) ────────────────────────────────────
  - type: worker
    name: churchos-celery-worker
    region: oregon
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "DJANGO_ENV=render celery -A churchos worker --loglevel=info --concurrency=2"
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: SECRET_KEY
        fromService:
          name: churchos-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: churchos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: churchos-redis
          type: redis
          property: connectionString
      - key: TIME_ZONE
        value: Africa/Accra
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── Celery Beat Scheduler (Background Service) ─────────────────────────────
  - type: worker
    name: churchos-celery-beat
    region: oregon
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "DJANGO_ENV=render celery -A churchos beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: SECRET_KEY
        fromService:
          name: churchos-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: churchos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: churchos-redis
          type: redis
          property: connectionString
      - key: TIME_ZONE
        value: Africa/Accra
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── Vue 3 Frontend (Static Site) ──────────────────────────────────────────
  - type: web
    name: churchos-frontend
    region: oregon
    plan: free
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # API proxying — all /api/* requests go to the Django service
      - type: rewrite
        source: /api/*
        destination: https://churchos-api.onrender.com/api/*
      - type: rewrite
        source: /media/*
        destination: https://churchos-api.onrender.com/media/*
      - type: rewrite
        source: /admin/*
        destination: https://churchos-api.onrender.com/admin/*
      # SPA fallback — all other routes serve index.html (Vue Router)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://churchos-api.onrender.com/api/v1
      - key: NODE_VERSION
        value: "20.11.0"
